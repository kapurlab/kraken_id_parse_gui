# Environment for Kraken ID Parse GUI
# Install with: conda env create -p /srv/kapurlab/tools/kraken_id_parse_gui/env -f conda_setup/environment.yml
name: kraken_id_parse
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python and scientific packages
  - python=3.10
  - pip
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scipy
  - scikit-learn
  - pytest
  - jinja2

  # Bioinformatics core tools
  - biopython
  - kraken2
  - krakentools
  - samtools
  - krona
  - tectonic
  # Pipeline tools the bin/ scripts shell out to. These are NOT optional — the
  # GUI's assembly/alignment/QC steps invoke them directly (e.g. fastq_stats_seqkit
  # calls `seqkit`), so a fresh env without them fails at runtime.
  - seqkit
  - blast
  - bwa
  - spades
  - bracken
  - picard
  - freebayes
  - vcflib
  - parallel
  - pigz

  # Analysis and data packages
  - scikit-allel
  - openpyxl
  - h5py
  - dask
  - humanize          # fastq_stats_seqkit.py imports this at module load

  # Web backend (FastAPI serves the GUI under OOD)
  - fastapi>=0.115.0
  - uvicorn-standard
  - aiofiles

  # Additional packages via pip
  - pip:
      - PyVCF3>=1.0.0  # VCF file handling
      - pydantic>=2.0.0
