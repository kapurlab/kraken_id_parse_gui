# Environment for Kraken ID Parse GUI
# Successfully tested on macOS with conda (not mamba due to codesigning issues)
name: kraken_id_parse
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python and scientific packages
  - python=3.10
  - pip
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scipy
  - scikit-learn
  - pytest

  # Bioinformatics core tools
  - biopython
  - kraken2
  - krakentools
  - samtools
  - krona

  # Analysis and data packages
  - scikit-allel
  - openpyxl
  - h5py
  - dask

  # Additional packages via pip
  - pip:
      - PyVCF3>=1.0.0  # VCF file handling (pyvcf alternative)

# Note: Additional bioinformatics tools can be added after initial setup:
# conda install -n kraken_id_parse -c conda-forge -c bioconda blast bwa spades seqkit bracken picard vcflib freebayes parallel pigz
