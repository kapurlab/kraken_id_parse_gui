# Environment for Kraken ID Parse GUI
# Install with: conda env create -p /srv/kapurlab/tools/kraken_id_parse_gui/env -f conda_setup/environment.yml
name: kraken_id_parse
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core Python and scientific packages
  - python=3.10
  - pip
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scipy
  - scikit-learn
  - pytest

  # Bioinformatics core tools
  - biopython
  - kraken2
  - krakentools
  - samtools
  - krona

  # Analysis and data packages
  - scikit-allel
  - openpyxl
  - h5py
  - dask

  # Web backend (FastAPI serves the GUI under OOD)
  - fastapi>=0.115.0
  - uvicorn-standard
  - aiofiles

  # Additional packages via pip
  - pip:
      - PyVCF3>=1.0.0  # VCF file handling
      - pydantic>=2.0.0

# Note: Additional bioinformatics tools can be added after initial setup:
# conda install -n kraken_id_parse -c conda-forge -c bioconda blast bwa spades seqkit bracken picard vcflib freebayes parallel pigz
