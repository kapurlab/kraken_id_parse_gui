# environment.yml - Updated for cross-platform compatibility
name: kraken_id_parse
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10  # Updated to more recent Python version
  - numpy>=1.21  # Updated numpy to be compatible with other packages
  - dask>=2023.1  # Updated dask version
  - scikit-allel>=1.3.7  # Use available compatible version
  - biopython>=1.79
  - blast>=2.12
  - bwa>=0.7
  - cairosvg>=2.5
  - kraken2>=2.1
  - krakentools>=1.2
  - matplotlib>=3.4
  - pandas>=1.3
  - pip
  - pysam>=0.16
  - pytest>=6.0
  - pyvcf3  # Python 3 compatible VCF parser (replaces pyvcf)
  - bcftools>=1.13
  - samtools>=1.13
  - seaborn>=0.11
  - spades>=3.15
  - minimap2>=2.24
  - flye>=2.9
  - svgwrite>=1.4
  - seqkit
  - openpyxl
  - humanize
  - krona
  - bracken=1.0.0  # Only available version
  - picard
  - vcflib
  - vcftools
  - freebayes
  - parallel
  - pigz
  - tk  # Adding tkinter support
